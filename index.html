<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yes</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: #1e1e1e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 10px; width: 250px; border-radius: 5px; border: none; margin-bottom: 10px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #1db954; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #1ed760; }
        #status { margin-top: 20px; color: #b3b3b3; }
        /* Keeping the player tiny but visible to satisfy YT terms */
        #player { margin-top: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Music Search</h2>
    <input type="text" id="songInput" placeholder="Artist - Song Name...">
    <br>
    <button onclick="searchAndPlay()">Play Song</button>
    <div id="status">Ready...</div>
    
    <div id="player"></div>
</div>

<script>
    // 1. GET YOUR KEY: https://console.cloud.google.com/apis/library/youtube.googleapis.com
    const API_KEY = 'AIzaSyBgRlgy7seujgUCFL5QOuB9UkRs1RDda3w'; 
    let player;

    // Load the YouTube IFrame API
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '200',
            width: '350',
            videoId: '', // Starts empty
            playerVars: { 'autoplay': 1, 'playsinline': 1 }
        });
    }

    async function searchAndPlay() {
        const query = document.getElementById('songInput').value;
        const status = document.getElementById('status');
        
        if (!query) return alert("Enter a song name!");
        if (API_KEY === 'YOUR_YOUTUBE_API_KEY_HERE') return alert("You forgot to add your API Key!");

        status.innerText = "Searching...";

        try {
            // Search for the song + "official audio" to get high quality
            const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query + " official audio")}&type=video&maxResults=1&key=${API_KEY}`;
            
            const response = await fetch(searchUrl);
            const data = await response.json();

            if (data.items && data.items.length > 0) {
                const videoId = data.items[0].id.videoId;
                const title = data.items[0].snippet.title;
                
                status.innerText = "Now Playing: " + title;
                player.loadVideoById(videoId);
            } else {
                status.innerText = "No results found.";
            }
        } catch (error) {
            status.innerText = "Error fetching data.";
            console.error(error);
        }
    }
</script>

</body>
</html>
